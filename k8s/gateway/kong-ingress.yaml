---
# ─── Kong Namespace & Install via Helm values ─────────────────────
# Install Kong: helm install kong kong/kong --namespace onepiece-gateway --values kong-values.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: onepiece-gateway
data:
  KONG_DATABASE: "off"
  KONG_PROXY_ACCESS_LOG: /dev/stdout
  KONG_ADMIN_ACCESS_LOG: /dev/stdout
  KONG_PROXY_ERROR_LOG: /dev/stderr
  KONG_ADMIN_ERROR_LOG: /dev/stderr
  KONG_ADMIN_LISTEN: "0.0.0.0:8001"

---
# ─── Main Ingress — routes all /api/* to correct services ─────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onepiece-ingress
  namespace: onepiece
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/plugins: "rate-limiting,cors-plugin"
    nginx.ingress.kubernetes.io/rewrite-target: "/"
spec:
  ingressClassName: kong   # 👈 IMPORTANT (manquant chez toi)
  rules:
    - host: onepiece.local
      http:
        paths:
          - path: /api/crews
            pathType: Prefix
            backend:
              service:
                name: crew-service
                port:
                  number: 3001
          - path: /api/characters
            pathType: Prefix
            backend:
              service:
                name: character-service
                port:
                  number: 3002
          - path: /api/devil-fruits
            pathType: Prefix
            backend:
              service:
                name: devil-fruit-service
                port:
                  number: 3003
          - path: /api/ships
            pathType: Prefix
            backend:
              service:
                name: ship-service
                port:
                  number: 3004
          - path: /api/battles
            pathType: Prefix
            backend:
              service:
                name: battle-service
                port:
                  number: 3005

---
# ─── Rate Limiting Plugin ─────────────────────────────────────────
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limiting
  namespace: onepiece
plugin: rate-limiting
config:
  minute: 100
  hour: 1000
  policy: local

---
# ─── CORS Plugin ──────────────────────────────────────────────────
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-plugin
  namespace: onepiece
plugin: cors
config:
  origins:
    - "*"
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  headers:
    - Accept
    - Content-Type
    - Authorization
  max_age: 3600

---
# ─── NetworkPolicy — restrict inter-service traffic ───────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: onepiece-network-policy
  namespace: onepiece
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app: gateway
        - podSelector: {}  # allow all pods in namespace to talk to each other
  egress:
    - to:
        - podSelector: {}  # within namespace
    - to:
        - namespaceSelector:
            matchLabels:
              app: monitoring
    - ports:
        - port: 53   # DNS
          protocol: UDP
        - port: 53
          protocol: TCP
