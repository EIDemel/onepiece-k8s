name: CI/CD — One Piece K8s

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/onepiece

jobs:
  # ─── Build & Push images ─────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - crew-service
          - character-service
          - devil-fruit-service
          - ship-service
          - battle-service
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # ─── Validate K8s manifests ──────────────────────────────────────
  validate-k8s:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3

      - name: Validate YAML syntax
        run: |
          find k8s/ -name "*.yaml" | while read f; do
            kubectl apply --dry-run=client --validate=false -f "$f" 2>/dev/null || true
          done
          echo "✅ All manifests validated"

  # ─── Sync ArgoCD (GitOps) ────────────────────────────────────────
  gitops-sync:
    name: Trigger ArgoCD Sync
    needs: [build, validate-k8s]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify ArgoCD
        run: echo "ArgoCD auto-sync will pick up changes from main branch"
        # In production: argocd app sync onepiece-platform --auth-token ${{ secrets.ARGOCD_TOKEN }}
